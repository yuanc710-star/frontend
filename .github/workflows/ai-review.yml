name: AI Review

# Triggered by a PR comment containing "@claude review". issue_comment workflows
# always run from the DEFAULT branch's copy of this file.
# This file is identical across the frontend / bff / backend repos: each checkout
# picks the PR's merge ref for the repo the PR lives in, and main for the other two.
on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    # Only wenyikuo can trigger the review, by commenting "@claude review" on a PR.
    # Anyone else's "@claude review" comment is ignored (the job never runs — no cost).
    if: >-
      ${{ github.event.issue.pull_request &&
          contains(github.event.comment.body, '@claude review') &&
          github.event.comment.user.login == 'wenyikuo' }}
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token (read all 3 repos + comment on PRs)
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEW_APP_ID }}
          private-key: ${{ secrets.REVIEW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            frontend
            bff
            backend

      # The repo the PR lives in is checked out at the PR's merge result; the other
      # two at main. The conditional ref makes this file identical across all 3 repos.
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/frontend
          ref: ${{ github.event.repository.name == 'frontend' && format('refs/pull/{0}/merge', github.event.issue.number) || 'main' }}
          path: frontend
          token: ${{ steps.app.outputs.token }}

      - name: Checkout bff
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/bff
          ref: ${{ github.event.repository.name == 'bff' && format('refs/pull/{0}/merge', github.event.issue.number) || 'main' }}
          path: bff
          token: ${{ steps.app.outputs.token }}

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/backend
          ref: ${{ github.event.repository.name == 'backend' && format('refs/pull/{0}/merge', github.event.issue.number) || 'main' }}
          path: backend
          token: ${{ steps.app.outputs.token }}

      - name: Gather PR context (diff + author)
        id: ctx
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          PR=${{ github.event.issue.number }}
          gh pr diff "$PR" --repo "${{ github.repository }}" > /tmp/pr.diff
          AUTHOR=$(gh pr view "$PR" --repo "${{ github.repository }}" --json author --jq .author.login)
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "Diff: $(wc -l < /tmp/pr.diff) lines; author: $AUTHOR"

      - name: Acknowledge the trigger (👀 reaction)
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          gh api -X POST "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=eyes >/dev/null 2>&1 || true

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run multi-round review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          {
            cat "$REPO_NAME/.github/ai-review-prompt.md"
            echo
            echo "---"
            echo "## This run"
            echo "- The PR under review is in the **$REPO_NAME** repo (checked out at ./$REPO_NAME)."
            echo "- PR: #${{ github.event.issue.number }} in ${{ github.repository }}"
            echo "- PR author to tag: @${{ steps.ctx.outputs.author }}"
            echo "- The unified diff is at /tmp/pr.diff"
            echo "- All three repos are at ./frontend, ./bff, ./backend (the two not under review are at main)."
            echo "- Output ONLY the final Markdown review (no preamble)."
          } > /tmp/prompt.txt
          claude -p "$(cat /tmp/prompt.txt)" \
            --model claude-opus-4-8 \
            --output-format text \
            --permission-mode bypassPermissions \
            --allowedTools "Read,Grep,Glob,Bash" \
            > /tmp/review.md
          echo "Review: $(wc -l < /tmp/review.md) lines"

      - name: Post review to the PR
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          if [ -s /tmp/review.md ]; then
            gh pr comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file /tmp/review.md
          else
            gh pr comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" \
              --body "⚠️ AI review produced no output — check the workflow run logs."
          fi
