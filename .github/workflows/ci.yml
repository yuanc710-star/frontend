name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so diff-cover can diff against the base branch

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # Unit + integration tests + jest coverageThreshold; writes coverage/lcov.info.
      - name: Test + coverage gate
        run: npm test

      # Patch coverage: lines changed in this PR must be >= 80% covered.
      - name: Patch coverage (changed lines >= 80%)
        run: |
          python -m pip install --quiet diff-cover
          BASE="${{ github.base_ref || 'main' }}"
          git fetch --no-tags --depth=1 origin "+refs/heads/$BASE:refs/remotes/origin/$BASE"
          diff-cover coverage/lcov.info \
            --compare-branch="origin/$BASE" \
            --fail-under=80
